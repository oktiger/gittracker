<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitTracker · 单项目 Card Mockup</title>
  <style>
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --panel-soft: #f6f7f8;
      --ink: #182027;
      --muted: #69747d;
      --line: #dce1e5;
      --line-strong: #c7ced4;
      --accent: #136f63;
      --accent-strong: #0d574e;
      --accent-soft: #e7f3f0;
      --blue: #246e96;
      --green: #23865a;
      --amber: #b87513;
      --shadow: 0 20px 56px rgba(30, 38, 44, .09);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh; margin: 0; padding: 48px 24px;
      display: flex; align-items: flex-start; justify-content: center;
      background:
        radial-gradient(700px 380px at 15% 0%, rgba(19,111,99,.08), transparent 65%),
        var(--bg);
      font-size: 14px;
    }
    button, textarea { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(19,111,99,.2); outline-offset: 2px;
    }

    .project-card {
      width: min(880px, 100%); padding: 20px;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; box-shadow: var(--shadow);
    }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
    .project-name { margin: 0; font-size: 21px; letter-spacing: -.45px; }
    .project-name a { color: inherit; text-decoration: none; }
    .project-name a:hover { color: var(--accent); }
    .project-path {
      max-width: 620px; margin-top: 5px; color: var(--muted);
      font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .project-meta { display: flex; align-items: center; gap: 8px; margin-top: 11px; color: var(--muted); font-size: 11px; }
    .branch { padding: 3px 7px; border-radius: 6px; background: var(--panel-soft); color: #38444d; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .status { padding: 5px 9px; border-radius: 999px; background: #fbf1dc; color: #8c5b0d; font-size: 11px; font-weight: 720; }

    .modules { display: grid; gap: 12px; margin-top: 17px; }
    .module { border: 1px solid var(--line); border-radius: 12px; background: #fbfcfc; overflow: visible; }
    .module-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 13px; border-bottom: 1px solid #e7ebed; }
    .module-heading { display: flex; align-items: center; gap: 8px; }
    .module-icon { width: 24px; height: 24px; border-radius: 7px; background: #e9eef0; color: #43515a; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 760; }
    .module-icon.docs { background: var(--accent-soft); color: var(--accent); }
    .module-title { font-size: 13px; font-weight: 750; }
    .module-note { color: var(--muted); font-size: 10px; }

    .commit-list { list-style: none; margin: 0; padding: 4px 13px; }
    .commit-list li { display: grid; grid-template-columns: 64px minmax(0,1fr) auto; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 1px solid #edf0f2; font-size: 11px; }
    .commit-list li:last-child { border-bottom: 0; }
    .hash { color: var(--blue); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .commit-copy { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #35414a; }
    .when { color: var(--muted); white-space: nowrap; font-size: 10px; }
    .code-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 13px; border-top: 1px solid #e7ebed; background: var(--panel); border-radius: 0 0 12px 12px; }
    .change-meta { color: var(--muted); font-size: 10px; }

    .btn { border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; background: var(--panel-soft); color: var(--ink); font-weight: 640; font-size: 11px; }
    .btn:hover { border-color: var(--line-strong); }
    .btn.primary { color: #fff; background: var(--accent); border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-strong); }
    .actions { display: flex; align-items: center; gap: 6px; }

    .docs-list { padding: 4px 0; }
    .doc-row {
      position: relative; display: grid; grid-template-columns: 42px minmax(0,1fr) 34px;
      align-items: center; gap: 10px; min-height: 62px; padding: 9px 10px 9px 13px;
      border-bottom: 1px solid #edf0f2; background: transparent;
    }
    .doc-row:last-child { border-bottom: 0; }
    .doc-row:hover { background: #f4f7f7; }
    .doc-type { width: 38px; padding: 4px 0; border-radius: 6px; text-align: center; color: var(--accent); background: var(--accent-soft); font-size: 9px; font-weight: 800; letter-spacing: .05em; }
    .doc-type.task { color: #5e6670; background: #e9edef; }
    .doc-main { min-width: 0; }
    .doc-title { margin: 0; font-size: 12px; font-weight: 720; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-file { margin-left: 6px; color: #9099a0; font: 9px ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 500; }
    .doc-desc { margin: 4px 0 0; color: var(--muted); font-size: 10px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .more { width: 30px; height: 30px; padding: 0; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--muted); font-size: 17px; line-height: 1; }
    .more:hover, .more.active { color: var(--accent); background: var(--accent-soft); border-color: #cce0dc; }
    .menu {
      display: none; position: absolute; z-index: 20; right: 10px; top: 48px;
      width: 190px; padding: 5px; border: 1px solid var(--line-strong);
      border-radius: 10px; background: var(--panel); box-shadow: 0 15px 38px rgba(25,33,40,.16);
    }
    .menu.show { display: block; animation: menu-in .12s ease; }
    @keyframes menu-in { from { opacity: 0; transform: translateY(-4px); } }
    .menu button { width: 100%; border: 0; border-radius: 7px; padding: 8px 9px; background: transparent; color: var(--ink); text-align: left; font-size: 11px; }
    .menu button:hover { color: var(--accent); background: var(--accent-soft); }
    .menu small { display: block; margin: 2px 9px 5px; color: var(--muted); font-size: 9px; line-height: 1.4; }
    .menu-sep { height: 1px; margin: 4px; background: var(--line); }

    .modal-backdrop { display: none; position: fixed; inset: 0; z-index: 50; padding: 24px; align-items: center; justify-content: center; background: rgba(17,24,29,.42); }
    .modal-backdrop.show { display: flex; }
    .editor { width: min(760px,100%); max-height: 88vh; display: flex; flex-direction: column; border: 1px solid var(--line-strong); border-radius: 15px; background: var(--panel); box-shadow: 0 30px 90px rgba(14,20,25,.28); overflow: hidden; }
    .editor-head, .editor-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 13px 16px; }
    .editor-head { border-bottom: 1px solid var(--line); }
    .editor-foot { border-top: 1px solid var(--line); }
    .editor-head strong { display: block; }
    .editor-file { margin-top: 3px; color: var(--muted); font: 9px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .editor-body { padding: 15px 16px; }
    .editor textarea { width: 100%; min-height: 330px; resize: vertical; border: 1px solid var(--line); border-radius: 9px; padding: 12px; background: var(--panel-soft); color: var(--ink); font: 11px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .icon-btn { width: 30px; height: 30px; padding: 0; }

    .toast { position: fixed; z-index: 80; left: 50%; bottom: 24px; opacity: 0; transform: translate(-50%, 12px); pointer-events: none; padding: 9px 13px; border-radius: 999px; background: #1d282e; color: #fff; font-size: 11px; transition: .18s ease; box-shadow: var(--shadow); }
    .toast.show { opacity: 1; transform: translate(-50%,0); }

    @media (max-width: 640px) {
      body { padding: 18px 10px; }
      .project-card { padding: 14px; }
      .project-path { max-width: 72vw; }
      .commit-list li { grid-template-columns: 58px minmax(0,1fr); }
      .commit-list .when { grid-column: 2; }
      .code-actions { align-items: flex-start; flex-direction: column; }
      .doc-row { grid-template-columns: 38px minmax(0,1fr) 32px; }
    }
  </style>
</head>
<body>
  <article class="project-card">
    <header class="card-head">
      <div>
        <h1 class="project-name"><a href="project-detail.html" title="打开项目详情">gittracker</a></h1>
        <div class="project-path">/Users/biem.mini/Documents/20260720_GitTracker/gittracker</div>
        <div class="project-meta"><span class="branch">main</span><span>↑2 ahead</span></div>
      </div>
      <span class="status">Changed</span>
    </header>

    <div class="modules">
      <section class="module" aria-labelledby="code-title">
        <header class="module-head">
          <div class="module-heading"><span class="module-icon">&lt;/&gt;</span><span class="module-title" id="code-title">代码</span></div>
          <span class="module-note">最近 3 次提交</span>
        </header>
        <ul class="commit-list">
          <li><span class="hash">90967fc</span><span class="commit-copy">重构看板项目卡片，以代码与文档双模块突出提交历史</span><span class="when">8 分钟前</span></li>
          <li><span class="hash">b876c9e</span><span class="commit-copy">新增信息架构重构原型，提供可交互看板与项目详情演示</span><span class="when">21 分钟前</span></li>
          <li><span class="hash">ec1624e</span><span class="commit-copy">修复 nvm 下找不到 Codex，并支持复制 AI 过程</span><span class="when">35 分钟前</span></li>
        </ul>
        <footer class="code-actions">
          <span class="change-meta">0 Staged · 5 Changes</span>
          <div class="actions"><a class="btn" href="project-detail.html#code" style="text-decoration:none">全部提交</a><button class="btn" data-toast="Mockup：打开运行方式">▶ 运行</button><button class="btn" data-toast="Mockup：查看代码变更">查看变更</button><button class="btn primary" data-toast="Mockup：打开提交编辑器">提交…</button></div>
        </footer>
      </section>

      <section class="module" aria-labelledby="docs-title">
        <header class="module-head">
          <div class="module-heading"><span class="module-icon docs">D</span><span class="module-title" id="docs-title">文档</span></div>
          <span class="module-note">双击文档可直接编辑</span>
        </header>
        <div class="docs-list" id="docsList"></div>
      </section>
    </div>
  </article>

  <div class="modal-backdrop" id="editorModal">
    <section class="editor" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <header class="editor-head"><div><strong id="editorTitle">编辑文档</strong><div class="editor-file" id="editorFile"></div></div><button class="btn icon-btn" id="closeEditor" aria-label="关闭">×</button></header>
      <div class="editor-body"><textarea id="editorContent" spellcheck="false"></textarea></div>
      <footer class="editor-foot"><span class="module-note">Markdown 文档</span><div class="actions"><button class="btn" id="cancelEditor">取消</button><button class="btn primary" id="saveEditor">保存文档</button></div></footer>
    </section>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const docs = [
      {
        type: 'GOAL', title: '项目目标', file: 'Goal/goal.md',
        desc: '提升 GitTracker 的信息层级、操作安全性与多项目响应速度。',
        content: '# 项目目标\n\n让不熟悉编程的用户也能通过清晰的选择，完成项目规划、实现与提交。\n\n## 核心原则\n\n把编程的问答题，变成用户可以理解和确认的选择题。'
      },
      {
        type: 'TASK', title: '修复 AI 取消状态', file: 'Task/001-fix-ai-cancel.md',
        desc: '让停止按钮真正终止后台任务，并准确显示最终状态。',
        content: '# 修复 AI 取消状态\n\n- 停止按钮终止后端进程\n- 区分取消、失败与完成\n- 停止后刷新项目状态'
      },
      {
        type: 'TASK', title: '重构看板信息架构', file: 'Task/002-board-information-architecture.md',
        desc: '项目卡片内分为代码与文档，让用户直接做出下一步选择。',
        content: '# 重构看板信息架构\n\n## 目标\n\n每张项目卡片同时呈现代码和文档，操作跟随具体对象出现。\n\n## 验收\n\n- 代码区显示最近三次提交\n- 文档逐条列出\n- 每份文档都有独立操作菜单'
      },
      {
        type: 'TASK', title: '并行加载项目状态', file: 'Task/003-parallel-project-status.md',
        desc: '逐个呈现仓库状态，避免一个慢项目阻塞整个看板。',
        content: '# 并行加载项目状态\n\n- 首屏先显示项目骨架\n- 最多四个仓库并行刷新\n- 单个仓库失败不影响其它项目'
      }
    ];

    const docsList = document.getElementById('docsList');
    docsList.innerHTML = docs.map((doc, index) => `
      <div class="doc-row" data-doc="${index}" tabindex="0" title="双击编辑 ${doc.title}">
        <span class="doc-type ${doc.type === 'TASK' ? 'task' : ''}">${doc.type === 'GOAL' ? '目标' : '任务'}</span>
        <div class="doc-main"><h3 class="doc-title">${doc.title}<span class="doc-file">${doc.file}</span></h3><p class="doc-desc">${doc.desc}</p></div>
        <button class="more" data-menu="${index}" aria-label="${doc.title}的更多操作" aria-expanded="false">⋯</button>
        <div class="menu" id="menu-${index}">
          <button data-action="edit" data-index="${index}">编辑文档</button>
          ${doc.type === 'GOAL' ? `
            <button data-action="regenerate" data-index="${index}">重新生成任务</button>
            <small>根据这份目标，重新整理任务清单</small>
          ` : `
            <button data-action="implement" data-index="${index}">开始实现</button>
            <small>让 AI 按这份任务文档修改代码</small>
          `}
          <div class="menu-sep"></div>
          <button data-action="preview" data-index="${index}">生成页面预览</button>
          <small>把文档内容变成可以直接查看和选择的页面</small>
        </div>
      </div>
    `).join('');

    let openMenu = null;
    let editingIndex = null;
    function closeMenus() {
      document.querySelectorAll('.menu').forEach(menu => menu.classList.remove('show'));
      document.querySelectorAll('.more').forEach(button => { button.classList.remove('active'); button.setAttribute('aria-expanded', 'false'); });
      openMenu = null;
    }
    function openEditor(index) {
      const doc = docs[index]; editingIndex = index;
      document.getElementById('editorTitle').textContent = `编辑 · ${doc.title}`;
      document.getElementById('editorFile').textContent = doc.file;
      document.getElementById('editorContent').value = doc.content;
      document.getElementById('editorModal').classList.add('show');
      setTimeout(() => document.getElementById('editorContent').focus(), 0);
    }
    function closeEditor() { document.getElementById('editorModal').classList.remove('show'); editingIndex = null; }

    document.addEventListener('click', event => {
      const more = event.target.closest('[data-menu]');
      if (more) {
        event.stopPropagation();
        const index = Number(more.dataset.menu); const menu = document.getElementById(`menu-${index}`); const opening = openMenu !== index;
        closeMenus();
        if (opening) { menu.classList.add('show'); more.classList.add('active'); more.setAttribute('aria-expanded', 'true'); openMenu = index; }
        return;
      }
      const action = event.target.closest('[data-action]');
      if (action) {
        event.stopPropagation();
        const index = Number(action.dataset.index); const doc = docs[index]; closeMenus();
        if (action.dataset.action === 'edit') openEditor(index);
        if (action.dataset.action === 'regenerate') showToast(`根据「${doc.title}」重新生成任务`);
        if (action.dataset.action === 'implement') showToast(`开始实现「${doc.title}」`);
        if (action.dataset.action === 'preview') showToast(`根据「${doc.title}」生成页面预览`);
        return;
      }
      const toastButton = event.target.closest('[data-toast]'); if (toastButton) showToast(toastButton.dataset.toast);
      closeMenus();
    });
    document.addEventListener('dblclick', event => { const row = event.target.closest('[data-doc]'); if (row && !event.target.closest('button')) openEditor(Number(row.dataset.doc)); });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') { closeMenus(); closeEditor(); }
      const row = event.target.closest?.('[data-doc]'); if (row && event.key === 'Enter') openEditor(Number(row.dataset.doc));
    });
    document.getElementById('closeEditor').addEventListener('click', closeEditor);
    document.getElementById('cancelEditor').addEventListener('click', closeEditor);
    document.getElementById('editorModal').addEventListener('click', event => { if (event.target.id === 'editorModal') closeEditor(); });
    document.getElementById('saveEditor').addEventListener('click', () => {
      if (editingIndex == null) return;
      docs[editingIndex].content = document.getElementById('editorContent').value;
      const title = docs[editingIndex].title; closeEditor(); showToast(`已保存「${title}」`);
    });

    let toastTimer;
    function showToast(message) {
      clearTimeout(toastTimer); const toast = document.getElementById('toast');
      toast.textContent = message; toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
