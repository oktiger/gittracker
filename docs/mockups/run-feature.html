<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GitTracker · 运行功能 Mockup（可点击，不真执行）</title>
<style>
  :root {
    --ink: #1a2229;
    --ink-soft: #2f3b46;
    --muted: #6b7782;
    --surface: rgba(255, 255, 255, 0.92);
    --surface-2: #f1f4f6;
    --border: #d7dee4;
    --border-strong: #b8c3cd;
    --accent: #246e96;
    --accent-strong: #1a5676;
    --green: #2ea062;
    --amber: #c48a1a;
    --danger: #c44836;
    --font-display: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
    --font-body: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
    --font-mono: "IBM Plex Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
    background:
      radial-gradient(900px 480px at 8% -10%, rgba(36, 110, 150, 0.16), transparent 60%),
      radial-gradient(700px 420px at 100% 0%, rgba(46, 160, 98, 0.1), transparent 55%),
      linear-gradient(180deg, #edf2f5 0%, #e4ebf0 100%);
  }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }
  .banner {
    display: flex; gap: 12px; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap;
    background: #fff8e8; border: 1px solid #e8d4a8; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #6a5320;
  }
  .topbar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.25rem; gap: 1rem; }
  .brand h1 { margin: 0; font-family: var(--font-display); font-size: 1.55rem; letter-spacing: -0.02em; }
  .brand p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.9rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }
  .project-card {
    display: flex; flex-direction: column; gap: 0.9rem;
    padding: 1.1rem 1.15rem 1rem;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface);
    position: relative;
  }
  .project-card.is-dirty { border-left: 3px solid var(--amber); }
  .project-card.is-clean { border-left: 3px solid var(--green); }
  .card-title-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-title { margin: 0; font-size: 1.15rem; font-weight: 600; font-family: var(--font-display); }
  .card-meta { display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center; font-size: 0.8rem; color: var(--muted); }
  .branch {
    font-family: var(--font-mono); background: var(--surface-2);
    padding: 0.15rem 0.45rem; border-radius: 6px; color: var(--ink-soft);
  }
  .badge { font-size: 0.72rem; font-weight: 600; padding: 0.18rem 0.5rem; border-radius: 999px; }
  .badge-clean { color: #1f6b45; background: rgba(46, 160, 98, 0.14); }
  .badge-dirty { color: #8a5a10; background: rgba(196, 138, 26, 0.16); }
  .counts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  .count { text-align: center; }
  .count-num { display: block; font-size: 1.15rem; font-weight: 650; }
  .count-label { font-size: 0.7rem; color: var(--muted); }
  .commits-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.35rem; }
  .commit { display: flex; gap: 0.45rem; font-size: 0.78rem; color: var(--muted); margin: 0.2rem 0; }
  .commit code { font-family: var(--font-mono); color: var(--accent); }
  .card-actions {
    display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center;
    padding-top: 0.35rem; border-top: 1px solid var(--border);
  }
  .btn {
    border: 1px solid var(--border); background: #fff; color: var(--ink);
    font: inherit; font-size: 0.82rem; padding: 0.4rem 0.7rem; border-radius: 7px; cursor: pointer;
  }
  .btn:hover { border-color: var(--border-strong); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-strong); }
  .btn-run { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600; }
  .btn-danger { color: var(--danger); border-color: #e8cfcf; }
  .btn-ghost { background: transparent; }
  .run-wrap { position: relative; }
  .menu {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 20;
    min-width: 260px; background: #fff; border: 1px solid var(--border);
    border-radius: 10px; padding: 6px; box-shadow: 0 8px 28px rgba(26, 34, 41, 0.12);
  }
  .menu-item {
    display: block; width: 100%; text-align: left; border: 0; background: transparent;
    padding: 0.55rem 0.65rem; border-radius: 7px; cursor: pointer; font: inherit;
  }
  .menu-item:hover, .menu-item:focus { background: rgba(36, 110, 150, 0.1); outline: none; }
  .menu-item .name { display: block; font-size: 0.86rem; font-weight: 600; color: var(--ink); }
  .menu-item .cmd { display: block; margin-top: 2px; font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); }
  .menu-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .menu-muted .name { font-weight: 500; color: var(--muted); }
  .star { color: var(--amber); margin-left: 4px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(26, 34, 41, 0.35);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem;
  }
  .overlay[hidden] { display: none !important; }
  .dialog {
    width: min(460px, 100%); background: #fff; border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 16px 48px rgba(26, 34, 41, 0.18);
  }
  .dialog-head { padding: 1rem 1.1rem 0.75rem; border-bottom: 1px solid var(--border); }
  .dialog-head h2 { margin: 0 0 0.3rem; font-size: 1.05rem; }
  .dialog-head p { margin: 0; font-size: 0.8rem; color: var(--muted); }
  .dialog-body { padding: 1rem 1.1rem; max-height: 55vh; overflow: auto; }
  .dialog-foot {
    display: flex; justify-content: flex-end; flex-wrap: wrap; gap: 0.45rem;
    padding: 0.75rem 1.1rem; border-top: 1px solid var(--border); background: var(--surface-2);
  }
  .target-row {
    display: flex; gap: 0.65rem; align-items: flex-start;
    border: 1px solid var(--border); border-radius: 9px; padding: 0.7rem;
    margin-bottom: 0.55rem; background: var(--surface-2);
  }
  .target-row.checked { border-color: var(--accent); background: rgba(36, 110, 150, 0.08); }
  .target-row input[type="checkbox"] { margin-top: 0.2rem; }
  .target-row label { flex: 1; cursor: pointer; }
  .target-row .t-name { font-weight: 650; font-size: 0.9rem; }
  .field { margin-top: 0.4rem; }
  .field span { display: block; font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
  .field input {
    width: 100%; font-family: var(--font-mono); font-size: 0.78rem;
    border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.5rem;
  }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    display: inline-block; animation: spin 0.7s linear infinite; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-line { font-size: 0.9rem; color: var(--muted); }

  .term-panel {
    margin-top: 1.25rem; background: #1e2429; color: #d4d8dc;
    border-radius: 12px; overflow: hidden; border: 1px solid #2c353c;
  }
  .term-panel[hidden] { display: none !important; }
  .term-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.55rem 0.85rem; background: #2a3238; font-size: 0.78rem; color: #a8b0b7;
  }
  .term-body {
    padding: 0.85rem 1rem; font-family: var(--font-mono); font-size: 0.78rem;
    line-height: 1.55; min-height: 120px; white-space: pre-wrap;
  }
  .term-body .ok { color: #7dcea0; }
  .term-body .dim { color: #7a848c; }
  .toast {
    position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 0.55rem 1rem; border-radius: 8px;
    font-size: 0.85rem; z-index: 60; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="banner">
    <div>
      <strong>前端 Mockup</strong> — 可点击操作，不会真正执行命令或调用 AI。
      演示：运行菜单 · AI 识别（假延迟）· 确认保存 · 模拟终端输出。
    </div>
    <button type="button" class="btn btn-ghost" id="btn-reset">重置演示数据</button>
  </div>

  <header class="topbar">
    <div class="brand">
      <h1>GitTracker</h1>
      <p>多项目 Git 看板 · 运行功能交互预览</p>
    </div>
  </header>

  <div class="grid" id="board"></div>

  <section class="term-panel" id="term" hidden>
    <div class="term-bar">
      <span id="term-title">系统终端（模拟）</span>
      <button type="button" class="btn btn-ghost" id="term-close" style="color:#ccc;border-color:#555;">关闭</button>
    </div>
    <div class="term-body" id="term-body"></div>
  </section>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="dialog" role="dialog" aria-modal="true" id="dialog"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/** @typedef {{ id: string, name: string, cwd: string, command: string, isDefault?: boolean }} RunTarget */
/** @typedef {{ id: string, name: string, path: string, branch: string, clean: boolean, staged: number, unstaged: number, untracked: number, ahead: number, commits: {hash:string,when:string,subject:string}[], targets: RunTarget[] | null }} Project */

const SUGGESTIONS = {
  eh: [
    { id: "s1", name: "网页开发", cwd: "apps/web", command: "pnpm dev", isDefault: true },
    { id: "s2", name: "桌面开发", cwd: "apps/desktop", command: "npm run tauri dev" },
    { id: "s3", name: "生产构建（可选）", cwd: "apps/desktop", command: "npm run tauri build" },
  ],
  landing: [
    { id: "s1", name: "本地开发", cwd: ".", command: "pnpm dev", isDefault: true },
    { id: "s2", name: "生产预览", cwd: ".", command: "pnpm build && pnpm start" },
  ],
  desktop: [
    { id: "s1", name: "桌面开发", cwd: ".", command: "npm run tauri:dev", isDefault: true },
    { id: "s2", name: "打开已构建 App", cwd: ".", command: "open src-tauri/target/release/MyApp.app" },
  ],
};

function defaultProjects() {
  return [
    {
      id: "eh",
      name: "eH",
      path: "~/Projects/eH",
      branch: "main",
      clean: false,
      staged: 3,
      unstaged: 1,
      untracked: 0,
      ahead: 2,
      commits: [{ hash: "a1b2c3d", when: "2 小时前", subject: "调整登录页样式" }],
      targets: null,
    },
    {
      id: "landing",
      name: "Landing",
      path: "~/Projects/landing",
      branch: "feat/hero",
      clean: true,
      staged: 0,
      unstaged: 0,
      untracked: 0,
      ahead: 0,
      commits: [{ hash: "9f8e7d6", when: "昨天", subject: "更新首页文案" }],
      targets: [
        { id: "t1", name: "本地开发", cwd: ".", command: "pnpm dev", isDefault: true },
      ],
    },
    {
      id: "desktop",
      name: "NoteDesk",
      path: "~/Projects/NoteDesk",
      branch: "develop",
      clean: true,
      staged: 0,
      unstaged: 0,
      untracked: 0,
      ahead: 0,
      commits: [{ hash: "1122334", when: "3 天前", subject: "托盘菜单优化" }],
      targets: null,
    },
  ];
}

const STORAGE_KEY = "gt-run-mockup-v1";
/** @type {Project[]} */
let projects = load();
let openMenuId = null;
let activeProjectId = null;
let draftTargets = [];
let identifyTimer = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return defaultProjects();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2400);
}

function getProject(id) {
  return projects.find((p) => p.id === id);
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = projects.map((p) => cardHtml(p)).join("");
  board.querySelectorAll("[data-action]").forEach((el) => {
    el.addEventListener("click", onAction);
  });
}

function cardHtml(p) {
  const dirty = !p.clean;
  const hasTargets = p.targets && p.targets.length > 0;
  const menuOpen = openMenuId === p.id;
  return `
    <article class="project-card ${dirty ? "is-dirty" : "is-clean"}" data-id="${p.id}">
      <header>
        <div class="card-title-row">
          <h2 class="card-title" title="${p.path}">${escapeHtml(p.name)}</h2>
        </div>
        <div class="card-meta">
          <span class="branch">${escapeHtml(p.branch)}</span>
          <span class="badge ${dirty ? "badge-dirty" : "badge-clean"}">${dirty ? "Changed" : "Clean"}</span>
          ${p.ahead > 0 ? `<span>↑${p.ahead}</span>` : ""}
        </div>
      </header>
      <div class="counts">
        <div class="count"><span class="count-num">${p.staged}</span><span class="count-label">Staged</span></div>
        <div class="count"><span class="count-num">${p.unstaged}</span><span class="count-label">Unstaged</span></div>
        <div class="count"><span class="count-num">${p.untracked}</span><span class="count-label">Untracked</span></div>
      </div>
      <section>
        <div class="commits-label">最近提交</div>
        ${p.commits.map((c) => `
          <div class="commit"><code>${c.hash}</code><span>${c.when}</span><span>${escapeHtml(c.subject)}</span></div>
        `).join("")}
      </section>
      <footer class="card-actions">
        <div class="run-wrap">
          <button type="button" class="btn btn-run" data-action="run-toggle" data-id="${p.id}">
            运行 ▾
          </button>
          ${menuOpen ? runMenuHtml(p, hasTargets) : ""}
        </div>
        <button type="button" class="btn" disabled>手动提交</button>
        <button type="button" class="btn btn-primary" disabled>一键提交</button>
        <button type="button" class="btn btn-danger" disabled>Discard</button>
      </footer>
    </article>
  `;
}

function runMenuHtml(p, hasTargets) {
  if (!hasTargets) {
    return `
      <div class="menu" role="menu">
        <button type="button" class="menu-item" data-action="ai-identify" data-id="${p.id}">
          <span class="name">识别启动方式…</span>
          <span class="cmd">用 AI 分析本项目（模拟）</span>
        </button>
        <div class="menu-sep"></div>
        <button type="button" class="menu-item menu-muted" data-action="manual-add" data-id="${p.id}">
          <span class="name">手动添加一条…</span>
        </button>
      </div>
    `;
  }
  const items = p.targets.map((t) => `
    <button type="button" class="menu-item" data-action="run-target" data-id="${p.id}" data-tid="${t.id}">
      <span class="name">${escapeHtml(t.name)}${t.isDefault ? '<span class="star">★</span>' : ""}</span>
      <span class="cmd">${escapeHtml(t.cwd)} · ${escapeHtml(t.command)}</span>
    </button>
  `).join("");
  return `
    <div class="menu" role="menu">
      ${items}
      <div class="menu-sep"></div>
      <button type="button" class="menu-item menu-muted" data-action="config" data-id="${p.id}">
        <span class="name">配置启动方式…</span>
      </button>
      <button type="button" class="menu-item menu-muted" data-action="ai-identify" data-id="${p.id}">
        <span class="name">重新用 AI 识别…</span>
      </button>
    </div>
  `;
}

function onAction(e) {
  const btn = e.currentTarget;
  const action = btn.getAttribute("data-action");
  const id = btn.getAttribute("data-id");
  e.stopPropagation();

  if (action === "run-toggle") {
    openMenuId = openMenuId === id ? null : id;
    renderBoard();
    return;
  }
  if (action === "run-target") {
    const tid = btn.getAttribute("data-tid");
    openMenuId = null;
    renderBoard();
    simulateRun(id, tid);
    return;
  }
  if (action === "ai-identify") {
    openMenuId = null;
    renderBoard();
    const p = getProject(id);
    if (p.targets && p.targets.length) {
      if (!confirm("将用新的识别结果替换当前启动目标，是否继续？（模拟）")) return;
    }
    startIdentify(id);
    return;
  }
  if (action === "manual-add" || action === "config") {
    openMenuId = null;
    renderBoard();
    openConfig(id, action === "manual-add");
    return;
  }
}

function simulateRun(projectId, targetId) {
  const p = getProject(projectId);
  const t = p.targets.find((x) => x.id === targetId);
  if (!t) return;
  const term = document.getElementById("term");
  const body = document.getElementById("term-body");
  document.getElementById("term-title").textContent = `系统终端（模拟）· ${p.name} · ${t.name}`;
  term.hidden = false;
  const full = `cd ${p.path}/${t.cwd === "." ? "" : t.cwd}`.replace(/\/$/, "") + ` && ${t.command}`;
  body.innerHTML = `<span class="ok">%</span> ${escapeHtml(full)}\n<span class="dim">（Mockup：未真实执行）</span>\n`;
  setTimeout(() => {
    if (t.command.includes("dev") || t.command.includes("start")) {
      body.innerHTML += `\n▲ Dev server ready\n<span class="ok">Local: http://localhost:3000</span>\n<span class="dim">按 Ctrl+C 可停止（模拟）</span>`;
    } else if (t.command.includes("build")) {
      body.innerHTML += `\n<span class="dim">building…</span>\n<span class="ok">Build complete (模拟)</span>`;
    } else if (t.command.includes("open")) {
      body.innerHTML += `\n<span class="ok">Opened application (模拟)</span>`;
    } else {
      body.innerHTML += `\n<span class="ok">Done (模拟)</span>`;
    }
  }, 450);
  toast(`已模拟运行：${t.name}`);
}

function startIdentify(projectId) {
  activeProjectId = projectId;
  const p = getProject(projectId);
  showDialog(`
    <div class="dialog-head">
      <h2>识别启动方式</h2>
      <p>将根据项目结构与常见脚本，建议可运行的目标（不会自动执行命令）。</p>
    </div>
    <div class="dialog-body">
      <p class="status-line"><span class="spinner"></span> 正在分析「${escapeHtml(p.name)}」… 请稍候</p>
      <p class="status-line" style="margin-top:0.75rem;font-size:0.8rem;">使用设置里当前的 AI 通道（模拟延迟，不调用真实 CLI）。</p>
    </div>
    <div class="dialog-foot">
      <button type="button" class="btn" id="dlg-cancel">取消</button>
    </div>
  `);
  document.getElementById("dlg-cancel").onclick = () => {
    clearTimeout(identifyTimer);
    closeDialog();
  };
  identifyTimer = setTimeout(() => showConfirm(projectId), 1400);
}

function showConfirm(projectId) {
  const p = getProject(projectId);
  const suggestions = (SUGGESTIONS[projectId] || [
    { id: "s1", name: "开发", cwd: ".", command: "npm run dev", isDefault: true },
  ]).map((t) => ({ ...t, checked: t.name.includes("可选") ? false : true }));
  draftTargets = suggestions;

  showDialog(`
    <div class="dialog-head">
      <h2>确认启动目标</h2>
      <p>已为「${escapeHtml(p.name)}」识别到 ${suggestions.length} 个目标。请勾选需要保留的项。</p>
    </div>
    <div class="dialog-body" id="confirm-list">
      ${suggestions.map((t, i) => targetRowHtml(t, i)).join("")}
    </div>
    <div class="dialog-foot">
      <button type="button" class="btn" id="dlg-add">手动添加一条</button>
      <button type="button" class="btn" id="dlg-cancel">取消</button>
      <button type="button" class="btn btn-primary" id="dlg-save">保存并用于运行</button>
    </div>
  `);

  bindConfirmHandlers(projectId);
}

function targetRowHtml(t, i) {
  return `
    <div class="target-row ${t.checked ? "checked" : ""}" data-idx="${i}">
      <input type="checkbox" id="chk-${i}" ${t.checked ? "checked" : ""} data-idx="${i}" />
      <label for="chk-${i}">
        <div class="t-name">${escapeHtml(t.name)}${t.isDefault ? ' <span class="star">★ 默认</span>' : ""}</div>
        <div class="field"><span>目录</span><input data-field="cwd" data-idx="${i}" value="${escapeAttr(t.cwd)}" /></div>
        <div class="field"><span>命令</span><input data-field="command" data-idx="${i}" value="${escapeAttr(t.command)}" /></div>
        <div class="field"><span>名称</span><input data-field="name" data-idx="${i}" value="${escapeAttr(t.name)}" /></div>
      </label>
    </div>
  `;
}

function bindConfirmHandlers(projectId) {
  const list = document.getElementById("confirm-list");
  list.querySelectorAll('input[type="checkbox"]').forEach((chk) => {
    chk.addEventListener("change", () => {
      const i = +chk.dataset.idx;
      draftTargets[i].checked = chk.checked;
      chk.closest(".target-row").classList.toggle("checked", chk.checked);
    });
  });
  list.querySelectorAll("input[data-field]").forEach((inp) => {
    inp.addEventListener("input", () => {
      const i = +inp.dataset.idx;
      draftTargets[i][inp.dataset.field] = inp.value;
    });
  });
  document.getElementById("dlg-cancel").onclick = closeDialog;
  document.getElementById("dlg-add").onclick = () => {
    draftTargets.push({
      id: "m" + Date.now(),
      name: "自定义",
      cwd: ".",
      command: "npm run dev",
      checked: true,
    });
    document.getElementById("confirm-list").innerHTML = draftTargets.map((t, i) => targetRowHtml(t, i)).join("");
    bindConfirmHandlers(projectId);
  };
  document.getElementById("dlg-save").onclick = () => {
    const kept = draftTargets
      .filter((t) => t.checked)
      .map((t, idx) => ({
        id: t.id || "t" + idx,
        name: t.name,
        cwd: t.cwd,
        command: t.command,
        isDefault: !!t.isDefault || idx === 0,
      }));
    if (!kept.length) {
      toast("请至少勾选一条");
      return;
    }
    if (!kept.some((t) => t.isDefault)) kept[0].isDefault = true;
    const p = getProject(projectId);
    p.targets = kept;
    save();
    closeDialog();
    toast(`已保存 ${kept.length} 个启动目标`);
    renderBoard();
  };
}

function openConfig(projectId, forceEmpty) {
  const p = getProject(projectId);
  const base = forceEmpty && !(p.targets && p.targets.length)
    ? [{ id: "m1", name: "开发", cwd: ".", command: "npm run dev", isDefault: true, checked: true }]
    : (p.targets || []).map((t) => ({ ...t, checked: true }));
  if (!base.length) {
    base.push({ id: "m1", name: "开发", cwd: ".", command: "npm run dev", isDefault: true, checked: true });
  }
  draftTargets = base;
  activeProjectId = projectId;
  showDialog(`
    <div class="dialog-head">
      <h2>配置启动方式</h2>
      <p>编辑「${escapeHtml(p.name)}」的启动目标。保存后可从运行菜单选择。</p>
    </div>
    <div class="dialog-body" id="confirm-list">
      ${draftTargets.map((t, i) => targetRowHtml(t, i)).join("")}
    </div>
    <div class="dialog-foot">
      <button type="button" class="btn" id="dlg-add">手动添加一条</button>
      <button type="button" class="btn" id="dlg-cancel">取消</button>
      <button type="button" class="btn btn-primary" id="dlg-save">保存并用于运行</button>
    </div>
  `);
  bindConfirmHandlers(projectId);
}

function showDialog(html) {
  document.getElementById("dialog").innerHTML = html;
  document.getElementById("overlay").hidden = false;
}

function closeDialog() {
  document.getElementById("overlay").hidden = true;
  document.getElementById("dialog").innerHTML = "";
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/'/g, "&#39;");
}

document.addEventListener("click", () => {
  if (openMenuId) {
    openMenuId = null;
    renderBoard();
  }
});

document.getElementById("term-close").onclick = () => {
  document.getElementById("term").hidden = true;
};

document.getElementById("btn-reset").onclick = () => {
  localStorage.removeItem(STORAGE_KEY);
  projects = defaultProjects();
  openMenuId = null;
  document.getElementById("term").hidden = true;
  closeDialog();
  renderBoard();
  toast("已重置演示数据");
};

document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") {
    clearTimeout(identifyTimer);
    closeDialog();
  }
});

renderBoard();
</script>
</body>
</html>
