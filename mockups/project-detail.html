<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitTracker · 项目详情 Mockup</title>
  <style>
    :root { --bg:#eef1f4; --panel:#fff; --soft:#f6f7f8; --ink:#182027; --muted:#69747d; --line:#dce1e5; --line2:#c7ced4; --accent:#136f63; --accent2:#0d574e; --accent-soft:#e7f3f0; --blue:#246e96; --amber:#b87513; --shadow:0 20px 56px rgba(30,38,44,.09); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink) }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;padding:34px 24px 64px;background:radial-gradient(700px 380px at 15% 0%,rgba(19,111,99,.08),transparent 65%),var(--bg);font-size:14px} button,input,textarea{font:inherit} button{cursor:pointer} button:focus-visible,input:focus-visible,textarea:focus-visible,a:focus-visible{outline:3px solid rgba(19,111,99,.2);outline-offset:2px}
    .page{width:min(1080px,100%);margin:auto}.back{display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;color:var(--accent);font-size:12px;font-weight:680;text-decoration:none}.hero{padding:20px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
    .hero-top,.module-head,.toolbar,.change-strip,.editor-head,.editor-foot{display:flex;align-items:center;justify-content:space-between;gap:14px}.project-name{margin:0;font-size:24px;letter-spacing:-.55px}.path{margin-top:5px;color:var(--muted);font:11px ui-monospace,SFMono-Regular,Menlo,monospace}.meta{display:flex;align-items:center;gap:8px;margin-top:11px;color:var(--muted);font-size:11px}.branch{padding:3px 7px;border-radius:6px;background:var(--soft);color:#38444d;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.status{padding:5px 9px;border-radius:999px;background:#fbf1dc;color:#8c5b0d;font-size:11px;font-weight:720}.hero-actions,.actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);border-radius:8px;padding:7px 11px;background:var(--soft);color:var(--ink);font-size:11px;font-weight:650;text-decoration:none}.btn:hover{border-color:var(--line2)}.btn.primary{color:#fff;background:var(--accent);border-color:var(--accent)}.btn.primary:hover{background:var(--accent2)}
    .workspace{margin-top:14px;background:#fbfcfc;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.7)}.tabs{display:flex;align-items:center;gap:4px;padding:7px;border-bottom:1px solid var(--line);background:#fff;border-radius:14px 14px 0 0}.tab{display:flex;align-items:center;gap:8px;padding:9px 15px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-size:12px;font-weight:700}.tab:hover{color:var(--ink);background:var(--soft)}.tab.active{color:var(--accent);background:var(--accent-soft)}.tab-count{min-width:20px;padding:2px 6px;border-radius:999px;background:rgba(105,116,125,.11);font-size:9px;text-align:center}.tab.active .tab-count{background:rgba(19,111,99,.12)}.tab-panel{display:none}.tab-panel.active{display:block}.module{overflow:visible}.module-head{padding:13px 15px;border-bottom:1px solid #e7ebed}.heading{display:flex;align-items:center;gap:9px}.icon{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;background:#e9eef0;color:#43515a;font-size:11px;font-weight:800}.icon.docs{color:var(--accent);background:var(--accent-soft)}.title{font-weight:760}.note{color:var(--muted);font-size:10px}
    .change-strip{padding:11px 15px;background:#fff;border-bottom:1px solid #e7ebed}.change-copy strong{font-size:12px}.change-copy span{margin-left:8px;color:var(--muted);font-size:10px}.change-count{color:var(--amber)}
    .toolbar{padding:10px 15px;border-bottom:1px solid #e7ebed}.search{width:min(320px,100%);padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-size:11px}.commit-count{color:var(--muted);font-size:10px}.commits{list-style:none;margin:0;padding:3px 15px}.commit{display:grid;grid-template-columns:70px minmax(0,1fr) 118px;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid #edf0f2}.commit:last-child{border-bottom:0}.hash{color:var(--blue);font:11px ui-monospace,SFMono-Regular,Menlo,monospace}.commit-title{font-size:12px;font-weight:650;line-height:1.35}.commit-author{margin-top:4px;color:var(--muted);font-size:10px}.when{text-align:right;color:var(--muted);font-size:10px;white-space:nowrap}.empty{display:none;padding:30px;text-align:center;color:var(--muted);font-size:12px}
    .docs{padding:4px 0}.doc{position:relative;display:grid;grid-template-columns:44px minmax(0,1fr) 34px;gap:10px;align-items:center;min-height:68px;padding:10px 12px 10px 15px;border-bottom:1px solid #edf0f2}.doc:last-child{border-bottom:0}.doc:hover{background:#f4f7f7}.doc-type{width:40px;padding:4px 0;border-radius:6px;text-align:center;color:var(--accent);background:var(--accent-soft);font-size:9px;font-weight:800}.doc-type.task{color:#5e6670;background:#e9edef}.doc-main{min-width:0}.doc-title{margin:0;font-size:12px}.file{margin-left:7px;color:#9099a0;font:9px ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:500}.desc{margin:4px 0 0;color:var(--muted);font-size:10px;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.more{width:30px;height:30px;padding:0;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);font-size:17px}.more:hover,.more.active{color:var(--accent);background:var(--accent-soft);border-color:#cce0dc}.menu{display:none;position:absolute;z-index:20;right:12px;top:52px;width:196px;padding:5px;border:1px solid var(--line2);border-radius:10px;background:#fff;box-shadow:0 15px 38px rgba(25,33,40,.16)}.menu.show{display:block}.menu button{width:100%;padding:8px 9px;border:0;border-radius:7px;background:transparent;text-align:left;color:var(--ink);font-size:11px}.menu button:hover{color:var(--accent);background:var(--accent-soft)}.menu small{display:block;margin:2px 9px 5px;color:var(--muted);font-size:9px;line-height:1.4}.sep{height:1px;margin:4px;background:var(--line)}
    .modal{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:24px;background:rgba(17,24,29,.42)}.modal.show{display:flex}.editor{width:min(760px,100%);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line2);border-radius:15px;background:#fff;box-shadow:0 30px 90px rgba(14,20,25,.28)}.editor-head,.editor-foot{padding:13px 16px}.editor-head{border-bottom:1px solid var(--line)}.editor-foot{border-top:1px solid var(--line)}.editor-body{padding:15px 16px}.editor textarea{width:100%;min-height:330px;resize:vertical;padding:12px;border:1px solid var(--line);border-radius:9px;background:var(--soft);color:var(--ink);font:11px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace}.editor-file{margin-top:3px;color:var(--muted);font:9px ui-monospace,SFMono-Regular,Menlo,monospace}.icon-btn{width:30px;height:30px;padding:0}.toast{position:fixed;z-index:80;left:50%;bottom:24px;opacity:0;transform:translate(-50%,12px);pointer-events:none;padding:9px 13px;border-radius:999px;background:#1d282e;color:#fff;font-size:11px;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:680px){body{padding:20px 10px}.hero{padding:15px}.hero-top{align-items:flex-start}.hero-actions{justify-content:flex-end}.path{max-width:74vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.commit{grid-template-columns:62px minmax(0,1fr)}.when{grid-column:2;text-align:left}.toolbar{align-items:flex-start;flex-direction:column}.search{width:100%}.change-strip{align-items:flex-start}.doc{grid-template-columns:40px minmax(0,1fr) 32px}}
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="ui-information-architecture.html">← 返回看板</a>
    <section class="hero">
      <div class="hero-top"><div><h1 class="project-name">gittracker</h1><div class="path">/Users/biem.mini/Documents/20260720_GitTracker/gittracker</div><div class="meta"><span class="branch">main</span><span>↑2 ahead</span><span>最后刷新：刚刚</span></div></div><div class="hero-actions"><span class="status">Changed</span><button class="btn" data-toast="Mockup：打开运行方式">▶ 运行项目</button></div></div>
    </section>

    <div class="workspace">
      <nav class="tabs" role="tablist" aria-label="项目内容">
        <button class="tab active" id="codeTab" role="tab" aria-selected="true" aria-controls="codePanel" data-tab="code"><span>&lt;/&gt;</span>代码<span class="tab-count">12</span></button>
        <button class="tab" id="docsTab" role="tab" aria-selected="false" aria-controls="docsPanel" data-tab="docs"><span>▤</span>文档<span class="tab-count">4</span></button>
      </nav>
      <section class="module tab-panel active" id="codePanel" role="tabpanel" aria-labelledby="codeTab">
        <header class="module-head"><div class="heading"><span class="icon">&lt;/&gt;</span><span class="title">代码</span></div><div class="actions"><span class="note">完整提交历史</span><button class="btn primary" data-toast="Mockup：打开提交编辑器">提交…</button></div></header>
        <div class="change-strip"><div class="change-copy"><strong class="change-count">5 个变更</strong><span>0 Staged · 工作区尚未提交</span></div><button class="btn" data-toast="Mockup：进入变更详情，可逐文件查看并暂存">查看变更 →</button></div>
        <div class="toolbar"><input class="search" id="commitSearch" placeholder="搜索提交说明、Hash 或作者" aria-label="搜索全部提交"/><span class="commit-count" id="commitCount"></span></div>
        <ol class="commits" id="commitList"></ol><div class="empty" id="empty">没有匹配的提交</div>
      </section>

      <section class="module tab-panel" id="docsPanel" role="tabpanel" aria-labelledby="docsTab" hidden>
        <header class="module-head"><div class="heading"><span class="icon docs">D</span><span class="title">项目文档</span></div><span class="note">共 4 份 · 双击可直接编辑</span></header>
        <div class="docs" id="docsList"></div>
      </section>
    </div>
  </main>

  <div class="modal" id="editorModal"><section class="editor" role="dialog" aria-modal="true" aria-labelledby="editorTitle"><header class="editor-head"><div><strong id="editorTitle">编辑文档</strong><div class="editor-file" id="editorFile"></div></div><button class="btn icon-btn" id="closeEditor" aria-label="关闭">×</button></header><div class="editor-body"><textarea id="editorContent" spellcheck="false"></textarea></div><footer class="editor-foot"><span class="note">Markdown 文档</span><div class="actions"><button class="btn" id="cancelEditor">取消</button><button class="btn primary" id="saveEditor">保存文档</button></div></footer></section></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const commits=[
      ['3e19ddf','收敛单项目卡片，按文档提供独立选择式操作','Biem','刚刚'],['90967fc','重构看板项目卡片，以代码与文档双模块突出提交历史','Biem','32 分钟前'],['b876c9e','新增信息架构重构原型，提供可交互看板与项目详情演示','Biem','46 分钟前'],['ec1624e','修复 nvm 下找不到 Codex，并支持复制 AI 过程','Biem','1 小时前'],['ab92442','增加 AI Provider 设置与测试入口','Biem','昨天 18:42'],['91fb481','并行获取项目状态，降低看板首屏等待时间','Biem','昨天 16:08'],['8f21d56','优化任务执行状态与取消反馈','Biem','昨天 11:26'],['71ca288','新增项目文档目标与任务解析','Biem','7月19日'],['5d93ae1','统一 Codex 与 Cursor Agent 调用通道','Biem','7月19日'],['3b047ce','完善提交前变更确认流程','Biem','7月18日'],['271af52','新增仓库运行方式识别','Biem','7月18日'],['14ca380','初始化 GitTracker 桌面应用','Biem','7月17日']
    ];
    const docs=[
      {type:'GOAL',title:'项目目标',file:'Goal/goal.md',desc:'提升 GitTracker 的信息层级、操作安全性与多项目响应速度。',content:'# 项目目标\n\n让不熟悉编程的用户也能通过清晰的选择，完成项目规划、实现与提交。\n\n## 核心原则\n\n把编程的问答题，变成用户可以理解和确认的选择题。'},
      {type:'TASK',title:'修复 AI 取消状态',file:'Task/001-fix-ai-cancel.md',desc:'让停止按钮真正终止后台任务，并准确显示最终状态。',content:'# 修复 AI 取消状态\n\n- 停止按钮终止后端进程\n- 区分取消、失败与完成'},
      {type:'TASK',title:'重构看板信息架构',file:'Task/002-board-information-architecture.md',desc:'项目卡片内分为代码与文档，让用户直接做出下一步选择。',content:'# 重构看板信息架构\n\n- 代码区展示提交历史\n- 文档逐条列出\n- 操作跟随具体对象'},
      {type:'TASK',title:'并行加载项目状态',file:'Task/003-parallel-project-status.md',desc:'逐个呈现仓库状态，避免一个慢项目阻塞整个看板。',content:'# 并行加载项目状态\n\n- 首屏先显示项目骨架\n- 最多四个仓库并行刷新'}
    ];
    const commitList=document.getElementById('commitList'),commitCount=document.getElementById('commitCount'),empty=document.getElementById('empty');
    function renderCommits(query=''){const q=query.trim().toLowerCase(),filtered=commits.filter(c=>c.join(' ').toLowerCase().includes(q));commitList.innerHTML=filtered.map(c=>`<li class="commit"><span class="hash">${c[0]}</span><div><div class="commit-title">${c[1]}</div><div class="commit-author">${c[2]}</div></div><span class="when">${c[3]}</span></li>`).join('');commitCount.textContent=q?`${filtered.length} / ${commits.length} 次提交`:`共 ${commits.length} 次提交`;empty.style.display=filtered.length?'none':'block'}
    renderCommits();document.getElementById('commitSearch').addEventListener('input',e=>renderCommits(e.target.value));
    const tabs=[...document.querySelectorAll('[data-tab]')];function selectTab(name){tabs.forEach(tab=>{const active=tab.dataset.tab===name;tab.classList.toggle('active',active);tab.setAttribute('aria-selected',String(active));const panel=document.getElementById(`${tab.dataset.tab}Panel`);panel.classList.toggle('active',active);panel.hidden=!active});closeMenus()}tabs.forEach(tab=>tab.addEventListener('click',()=>selectTab(tab.dataset.tab)));if(location.hash==='#docs')selectTab('docs');
    const docsList=document.getElementById('docsList');docsList.innerHTML=docs.map((d,i)=>`<div class="doc" data-doc="${i}" tabindex="0" title="双击编辑 ${d.title}"><span class="doc-type ${d.type==='TASK'?'task':''}">${d.type==='GOAL'?'目标':'任务'}</span><div class="doc-main"><h3 class="doc-title">${d.title}<span class="file">${d.file}</span></h3><p class="desc">${d.desc}</p></div><button class="more" data-menu="${i}" aria-label="${d.title}的更多操作">⋯</button><div class="menu" id="menu-${i}"><button data-action="edit" data-index="${i}">编辑文档</button>${d.type==='GOAL'?`<button data-action="regenerate" data-index="${i}">重新生成任务</button><small>根据目标重新整理任务清单</small>`:`<button data-action="implement" data-index="${i}">开始实现</button><small>让 AI 按这份任务修改代码</small>`}<div class="sep"></div><button data-action="preview" data-index="${i}">生成页面预览</button><small>把文档变成可以直接查看和选择的页面</small></div></div>`).join('');
    let editing=null,toastTimer;const modal=document.getElementById('editorModal');function closeMenus(){document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show'));document.querySelectorAll('.more').forEach(b=>b.classList.remove('active'))}function edit(i){editing=i;document.getElementById('editorTitle').textContent=`编辑 · ${docs[i].title}`;document.getElementById('editorFile').textContent=docs[i].file;document.getElementById('editorContent').value=docs[i].content;modal.classList.add('show');setTimeout(()=>document.getElementById('editorContent').focus(),0)}function closeEditor(){modal.classList.remove('show');editing=null}function toast(text){clearTimeout(toastTimer);const t=document.getElementById('toast');t.textContent=text;t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}
    document.addEventListener('click',e=>{const more=e.target.closest('[data-menu]');if(more){e.stopPropagation();const menu=document.getElementById(`menu-${more.dataset.menu}`),open=!menu.classList.contains('show');closeMenus();if(open){menu.classList.add('show');more.classList.add('active')}return}const action=e.target.closest('[data-action]');if(action){e.stopPropagation();const i=+action.dataset.index,name=docs[i].title;closeMenus();if(action.dataset.action==='edit')edit(i);if(action.dataset.action==='regenerate')toast(`根据「${name}」重新生成任务`);if(action.dataset.action==='implement')toast(`开始实现「${name}」`);if(action.dataset.action==='preview')toast(`根据「${name}」生成页面预览`);return}const b=e.target.closest('[data-toast]');if(b)toast(b.dataset.toast);closeMenus()});
    document.addEventListener('dblclick',e=>{const row=e.target.closest('[data-doc]');if(row&&!e.target.closest('button'))edit(+row.dataset.doc)});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMenus();closeEditor()}const row=e.target.closest?.('[data-doc]');if(row&&e.key==='Enter')edit(+row.dataset.doc)});document.getElementById('closeEditor').onclick=closeEditor;document.getElementById('cancelEditor').onclick=closeEditor;modal.addEventListener('click',e=>{if(e.target===modal)closeEditor()});document.getElementById('saveEditor').onclick=()=>{if(editing===null)return;docs[editing].content=document.getElementById('editorContent').value;const name=docs[editing].title;closeEditor();toast(`已保存「${name}」`)};
  </script>
</body>
</html>
